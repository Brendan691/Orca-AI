# ============================================================
# 文件：docker-compose.yml
# 作用：一键启动小鲸 OrcaAI 全部服务
# 用法：docker-compose up -d
#
# 包含服务：
#   - backend：FastAPI 后端（API + Chroma 向量数据库）
#   - admin：  Streamlit 管理后台
# ============================================================

version: "3.8"

services:
  backend:
    build: .
    container_name: orcaai-backend
    ports:
      - "8000:8000"
    volumes:
      # Chroma 持久化存储，重启不丢数据
      - chroma_data:/app/backend/chroma_db
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    build: .
    container_name: orcaai-admin
    ports:
      - "8501:8501"
    command: streamlit run admin/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
