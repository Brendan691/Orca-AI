# SearXNG 配置 — 小鲸 OrcaAI 联网搜索引擎
use_default_settings: true
general:
  instance_name: "小鲸 OrcaAI Search"
  debug: false
search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json
server:
  secret_key: "orcaai-searxng-secret-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true
ui:
  static_use_hash: true
  default_theme: simple
  default_locale: zh-Hans-CN
engines:
  - name: duckduckgo
    disabled: false
  - name: bing
    disabled: false
  - name: google
    disabled: false
