# 标签分类提示词模板
tag_classification_prompt: |
  你是一位海事航运领域的专家。请仔细阅读以下文章内容，
  从四个维度进行分类。每个维度最多选择3个最相关的标签。

  业务类型维度（选择最相关的1-3个）：
  {business_type_list}

  地理区域维度（选择最相关的1-3个）：
  {geographic_region_list}

  主题类别维度（选择最相关的1-3个）：
  {topic_category_list}

  事件性质维度（选择最相关的1-3个）：
  {event_nature_list}

  文章内容：
  {content}

  请以JSON格式返回分类结果，格式如下：
  {{
    "business_type": ["标签1", "标签2"],
    "geographic_region": ["标签1"],
    "topic_category": ["标签1", "标签2", "标签3"],
    "event_nature": ["标签1"],
    "confidence": 0.85,
    "summary": "文章核心内容的简短摘要（50字以内）"
  }}

  注意：只返回JSON，不要其他内容。
